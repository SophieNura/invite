    </filter>
    <linearGradient id="stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A9B70" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#6F7F56" stop-opacity="0.2" />
    </linearGradient>
    <radialGradient id="ranunculusA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F9E8DB" stop-opacity="0.95" />
      <stop offset="45%" stop-color="#EFC6BD" stop-opacity="0.82" />
      <stop offset="100%" stop-color="#D28EA0" stop-opacity="0.28" />
    </radialGradient>
    <radialGradient id="ranunculusB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF3E7" stop-opacity="0.95" />
      <stop offset="45%" stop-color="#F2D7C7" stop-opacity="0.78" />
      <stop offset="100%" stop-color="#DDA8A1" stop-opacity="0.24" />
    </radialGradient>
    <radialGradient id="tulipPink" cx="50%" cy="35%" r="70%">
